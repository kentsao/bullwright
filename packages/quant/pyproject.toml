[project]
name = "bullwright-quant"
version = "0.1.0"
description = "Bullwright quant engine: market data providers, scoring, backtests (docs/INDEXES.md)."
requires-python = ">=3.12"
dependencies = [
    "bullwright-core",
    "bullwright-db",
    "numpy>=1.26",
]

[project.optional-dependencies]
# yfinance is ONE adapter, not a core dependency: it is scraping-based,
# breaks without notice, and its data may not be redistributed. The
# framework defaults to the deterministic FixtureProvider; install this
# extra explicitly to pull real free data locally.
yfinance = ["yfinance>=0.2.40"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/bullwright_quant"]

[tool.uv.sources]
bullwright-core = { workspace = true }
bullwright-db = { workspace = true }
