[alembic]
script_location = %(here)s/migrations
prepend_sys_path = .
# URL comes from BW_DB_URL via migrations/env.py; this is a fallback for
# running alembic from the repo root in dev.
sqlalchemy.url = sqlite:///data/bullwright.db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
