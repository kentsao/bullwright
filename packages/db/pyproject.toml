[project]
name = "bullwright-db"
version = "0.1.0"
description = "Bullwright persistence: SQLAlchemy models + Alembic migrations (SQLite dev / Postgres cloud)."
requires-python = ">=3.12"
dependencies = [
    "bullwright-core",
    "sqlalchemy>=2.0.30",
    "alembic>=1.13",
]

[project.optional-dependencies]
postgres = ["psycopg[binary]>=3.1"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/bullwright_db"]

[tool.uv.sources]
bullwright-core = { workspace = true }
