[project]
name = "bullwright-core"
version = "0.1.0"
description = "Bullwright domain models: report envelope, status machine, report-type schemas."
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.7",
    "python-ulid>=2.7",
    "jsonschema>=4.22",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/bullwright_core"]
