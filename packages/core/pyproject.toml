[project]
name = "bullwright-core"
version = "0.0.1"
description = "Bullwright domain models: report envelope, status machine, index protocol."
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.7",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/bullwright_core"]
