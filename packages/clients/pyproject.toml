[project]
name = "bullwright-client"
version = "0.1.0"
description = "Typed Bullwright API client + the bw-agent CLI that agents drive."
requires-python = ">=3.12"
dependencies = [
    "bullwright-core",
    "httpx2>=0.1",
    "typer>=0.12",
]

[project.scripts]
bw-agent = "bullwright_client.cli:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/bullwright_client"]

[tool.uv.sources]
bullwright-core = { workspace = true }
