name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  secrets-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  lint-and-unit:
    name: Lint, typecheck, unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"
      - run: uv sync --all-packages --dev
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run mypy .
      - run: uv run pytest tests/unit -q
      - name: Dependency audit
        run: uv run --with pip-audit pip-audit --skip-editable || true
        # || true until phase 1 pins are reviewed; then becomes blocking

  integration:
    name: Contract + security tests (${{ matrix.db }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        db: [sqlite, postgres]
    services:
      postgres:
        image: ${{ matrix.db == 'postgres' && 'postgres:16' || '' }}
        env:
          POSTGRES_USER: bullwright
          POSTGRES_PASSWORD: bullwright
          POSTGRES_DB: bullwright_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U bullwright"
          --health-interval 5s --health-timeout 5s --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"
      - run: uv sync --all-packages --dev
      - name: Run integration + security suites
        env:
          BW_TEST_DB_URL: ${{ matrix.db == 'postgres' && 'postgresql+psycopg://bullwright:bullwright@localhost:5432/bullwright_test' || '' }}
        run: uv run pytest tests/integration tests/security -q

  openapi-drift:
    name: OpenAPI drift check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"
      - run: uv sync --all-packages --dev
      - name: Regenerate and diff
        run: |
          uv run bw openapi-export --out /tmp/openapi.json
          diff -u docs/openapi.json /tmp/openapi.json \
            || (echo "::error::docs/openapi.json is stale — run 'bw openapi-export'" && exit 1)

  docker-build:
    name: Docker image builds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/Dockerfile
          push: false
          tags: bullwright:ci

  blog-build:
    name: Astro build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
        working-directory: apps/web
      - run: npx astro build
        working-directory: apps/web
